{% extends 'liga/base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-info text-white">
                <h3 class="h5 mb-0">Iniciar Sesión</h3>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {{ form.as_p }}
                    <button type="submit" class="btn btn-info text-white w-100">Entrar</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
